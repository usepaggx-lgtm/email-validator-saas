services:
  - type: web
    name: saas-base-whatsapp
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 3003
      - key: SESSIONS_DIR
        value: /data/sessions
      - key: WHATSAPP_API_KEY
        value: your-api-key-here
